services:
  backend:
    command: >
      uv run uvicorn app:app --host 0.0.0.0 --port 8000 --no-access-log
      --reload --reload-dir /app
    volumes:
      - ./backend:/app
      - ./data/users_analytics:/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    command: >
      sh -c "[ ! -f node_modules/.package-lock.json ] ||
             diff -q package-lock.json node_modules/.package-lock.json > /dev/null 2>&1 ||
             npm ci
             && npm run dev -- --hostname 0.0.0.0 --port 3000"
    environment:
      BACKEND_DOMAIN: http://backend:8000
      ALLOWED_DEV_ORIGINS: ${ALLOWED_DEV_ORIGINS:-}
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    # ports:
    #   - "3000:3000"  # 需要本機直連時 uncomment，平時走 Tunnel

volumes:
  frontend_node_modules:
  frontend_next_cache:
