services:
  vllm:
    image: vllm/vllm-openai:nightly
    profiles:
      - vllm
    gpus: all
    ipc: host
    expose:
      - "8005"
    env_file:
      - .env
    volumes:
      - ./data/huggingface:/root/.cache/huggingface
    command: >
      ${APP_VLLM_MODEL}
      --tensor-parallel-size 1
      --async-scheduling
      --max-model-len 32000
      --gpu-memory-utilization 0.85
      --host 0.0.0.0
      --port 8005
      --reasoning-parser qwen3
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder 
      --mm-encoder-tp-mode data
      --media-io-kwargs '{"video":{"num_frames":12}}'
      --mm-processor-kwargs '{"fps":2}'
      ${APP_VLLM_API_KEY:+--api-key $APP_VLLM_API_KEY}
    restart: unless-stopped

  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    gpus: all
    ipc: host
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - ./backend/:/backend/
    command: >
      uvicorn app:app --host 0.0.0.0 --port 8000 --no-access-log
      ${BACKEND_DEV_MODE:+--reload --reload-dir /backend}
    tty: true
    stdin_open: true
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:20-bookworm-slim
    working_dir: /frontend
    command: ["bash", "/frontend.sh"]
    env_file:
      - .env
    volumes:
      - ./docker/frontend.sh:/frontend.sh:ro
      - ./frontend:/frontend
    ports:
      - "3000:3000"
    restart: unless-stopped
    
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped

