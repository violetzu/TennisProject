x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      TZ: Asia/Taipei
      POSTGRES_USER: tennis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: tennis
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tennis"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging

  fastapi:
    build:
      context: ./fastapi-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      TZ: Asia/Taipei
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: tennis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: tennis
      SECRET_KEY: ${SECRET_KEY}
      APP_VLLM_URL: ${APP_VLLM_URL:-http://vllm:8005}
      APP_VLLM_MODEL: ${APP_VLLM_MODEL:-}
      APP_VLLM_API_KEY: ${APP_VLLM_API_KEY:-}
      APP_EMBEDDING_URL: ${APP_EMBEDDING_URL:-http://vllm-embedding:8006}
      APP_EMBEDDING_MODEL: ${APP_EMBEDDING_MODEL:-}
      APP_EMBEDDING_API_KEY: ${APP_EMBEDDING_API_KEY:-}
      VIDEO_URL_DOMAIN: ${VIDEO_URL_DOMAIN:-http://fastapi:8000}
    expose:
      - "8000"
    volumes:
      - ./fastapi-service/models:/app/models
      - ./fastapi-service/test:/app/test
      - ./data/users_analytics:/data
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy
    logging: *default-logging

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      TZ: Asia/Taipei
      FASTAPI_SERVICE_URL: http://fastapi:8000
      ALLOWED_DEV_ORIGINS: ${ALLOWED_DEV_ORIGINS:-}
    expose:
      - "3000"
    depends_on:
      fastapi:
        condition: service_healthy
    logging: *default-logging

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    depends_on:
      - app
    logging: *default-logging

  vllm:
    image: vllm/vllm-openai:nightly
    profiles: [vllm, llm]
    restart: unless-stopped
    ipc: host
    expose:
      - "8005"
    environment:
      TZ: Asia/Taipei
    volumes:
      - ./data/huggingface:/root/.cache/huggingface
    command: >
      ${APP_VLLM_MODEL}
      --tensor-parallel-size 1
      --async-scheduling
      --max-model-len 32000
      --gpu-memory-utilization 0.85
      --host 0.0.0.0
      --port 8005
      --reasoning-parser qwen3
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --mm-encoder-tp-mode data
      --media-io-kwargs '{"video":{"num_frames":12}}'
      --mm-processor-kwargs '{"fps":2}'
      ${APP_VLLM_API_KEY:+--api-key $APP_VLLM_API_KEY}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    logging: *default-logging

  vllm-embedding:
    image: vllm/vllm-openai:nightly
    profiles: [vllm, embedding]
    restart: unless-stopped
    ipc: host
    expose:
      - "8006"
    environment:
      TZ: Asia/Taipei
    volumes:
      - ./data/huggingface:/root/.cache/huggingface
    command: >
      BAAI/bge-m3
      --host 0.0.0.0
      --port 8006
      --gpu-memory-utilization 0.05
      ${APP_EMBEDDING_API_KEY:+--api-key $APP_EMBEDDING_API_KEY}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    logging: *default-logging
